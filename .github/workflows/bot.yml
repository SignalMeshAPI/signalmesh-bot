name: SignalMesh Bot — 24/7

on:
  schedule:
    - cron: '0/50 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run SignalMesh Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: timeout 2950 python bot.py || true
